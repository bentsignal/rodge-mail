appId: com.bentsignal.rodge-mail
productName: Rodge Mail
asar: true
directories:
  buildResources: resources
  output: release
files:
  - out/**
  - package.json
  - "!node_modules/**"
extraResources:
  - from: ../web/.output
    to: web
  - from: resources/embedded-web-bootstrap.mjs
    to: embedded-web-bootstrap.mjs
protocols:
  - name: Rodge Mail
    schemes:
      - rodge-mail
mac:
  category: public.app-category.productivity
  entitlements: resources/entitlements.mac.plist
  hardenedRuntime: true
  icon: resources/icon.icns
  target:
    - dmg
    - zip
win:
  icon: resources/icon.ico
  target:
    - nsis
linux:
  category: Office
  icon: resources/icon.png
  target:
    - AppImage
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
